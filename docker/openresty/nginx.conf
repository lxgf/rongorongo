worker_processes auto;
error_log /dev/stderr warn;
pid /var/run/openresty.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /usr/local/openresty/nginx/conf/mime.types;
    default_type  application/octet-stream;

    access_log /dev/stdout;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens off;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # FastCGI cache path (used by openresty, not Varnish)
    fastcgi_cache_path /tmp/nginx_cache levels=1:2 keys_zone=FCGI:50m inactive=60m;
    fastcgi_cache_key "$scheme$request_method$host$request_uri";

    server {
        listen 80;
        server_name _;
        root /var/www/html/public;
        index index.php;

        # Use relative redirects so proxy port is preserved
        absolute_redirect off;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        # Static assets — long cache headers (Varnish will cache these)
        location ~* \.(gif|GIF|png|jpg|jpeg|webp|svg|ico|css|js|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable, max-age=31536000";
            add_header Vary "Accept-Encoding";
            try_files $uri =404;
        }

        # Admin panel — no caching
        location /admin {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Laravel health check
        location = /up {
            try_files $uri /index.php?$query_string;
        }

        # Main PHP handler
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass app:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include /usr/local/openresty/nginx/conf/fastcgi_params;

            fastcgi_buffer_size 128k;
            fastcgi_buffers 4 256k;
            fastcgi_busy_buffers_size 256k;
            fastcgi_read_timeout 120;

            # Pass real IP and proxy headers from Varnish
            fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
            fastcgi_param HTTP_X_FORWARDED_PORT $http_x_forwarded_port;
            fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
            fastcgi_param REMOTE_ADDR $http_x_real_ip;
        }

        # Deny hidden files
        location ~ /\. {
            deny all;
        }
    }
}
